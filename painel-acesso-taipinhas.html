<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Auto Taipinhas</title>
    <meta name="description" content="Área de administração da Auto Taipinhas.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="admin-body">
    <div class="admin-login-container">
        <div class="admin-login-card">
            <div class="admin-login-header">
                <img src="/images/logo_black_vector.svg" alt="Auto Taipinhas" class="access-logo">
                <p>Área de Administração</p>
            </div>

            <form id="adminLoginForm" class="admin-login-form">
                <div class="form-group">
                    <label for="username">Email</label>
                    <input
                        type="email"
                        id="username"
                        name="username"
                        required
                        autocomplete="username"
                        placeholder="admin@autotaipinhas.pt"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Palavra-passe</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        autocomplete="current-password"
                        placeholder="Introduza a palavra-passe"
                    >
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <span>Lembrar-me</span> 
                        <input type="checkbox" id="rememberMe">  
                        
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-large btn-block" id="loginBtn">
                    Entrar
                </button>
            </form>

            <div id="loginMessage" class="login-message" style="display: none;"></div>

            <div class="admin-login-footer">
                <a href="index.html">← Voltar ao Site</a>
            </div>

            <div class="admin-login-info">
                <p>
                    <small>
                        🔐 <strong>Acesso reservado à administração</strong><br>
                        Por favor, introduza as suas credenciais para aceder ao painel de controlo.
                    </small>
                </p>
            </div>
        </div>
    </div>

    <script type="module" src="js/admin-login.js"></script>
</body>
</html>
