<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Auto Taipinhas</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">
    <div class="admin-login-container">
        <div class="admin-login-card">
            <div class="admin-login-header">
                <h1>Auto <span>Taipinhas</span></h1>
                <p>Área de Administração</p>
            </div>

            <form id="adminLoginForm" class="admin-login-form">
                <div class="form-group">
                    <label for="username">Email</label>
                    <input
                        type="email"
                        id="username"
                        name="username"
                        required
                        autocomplete="username"
                        placeholder="admin@autotaipinhas.pt"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Palavra-passe</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        autocomplete="current-password"
                        placeholder="Introduza a palavra-passe"
                    >
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span>Lembrar-me</span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-large btn-block" id="loginBtn">
                    Entrar
                </button>
            </form>

            <div id="loginMessage" class="login-message" style="display: none;"></div>

            <div class="admin-login-footer">
                <a href="index.html">← Voltar ao Site</a>
            </div>

            <div class="admin-login-info">
                <p>
                    <small>
                        🔐 <strong>Acesso reservado à administração</strong><br>
                        Utilize as credenciais criadas no Supabase Auth.
                    </small>
                </p>
            </div>
        </div>
    </div>

    <script type="module" src="js/admin-login.js"></script>
</body>
</html>
